<!DOCTYPE html>
<html lang='ko'>

<head>
  <meta charset='UTF-8' />
  <title>⚾ 삼성 헌터스 오더 작성 ⚾</title>

  <link rel="stylesheet" href="common.css" />
  <link rel="stylesheet" href="order_write.css" />
  <script>
    /* 페이지 깜빡임 방지: HTML을 읽자마자 테마 적용 */
    (function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>
</head>

<body>
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div id="loadingText">데이터 처리 중...</div>
  </div>

  <h1>⚾ 삼성 헌터스 오더 작성 ⚾</h1>

  <hr>

  <div style='margin-top:10px; display:flex; gap:10px;'>
    <button class='buttonStyles' onclick="location.href='index.html'">🏠 홈화면</button>
    <button class='buttonStyles' onclick="toggleDarkMode()">🌓 테마 전환</button>
  </div>

  <div style='margin-top:10px;'>
    <label>오더명: </label>
    <input type='text' id='orderName' placeholder='ex) 26-03-01 NBL' style='width:260px; padding:6px;' />
    <button class='buttonStyles' onclick='saveOrder()'>💾 저장</button>
  </div>

  <div id='mainArea'>

    <div id='areaA' class='panelBox'>
      <span style="font-weight: bolder;">참가 명단</span>

      <div style='display:flex; gap:10px; align-items:center; margin-bottom:5px; margin-top: 5px;'>
        <select id='playerSelect' style="width: 100px;"></select>
        <button class='buttonStyles' onclick='addPlayer()'>추가</button>
      </div>

      <table class="table_common">
        <thead>
          <tr>
            <th style="width: 80px;">선수명</th>
            <th style="width: 40px;"></th>
          </tr>
        </thead>
        <tbody id='playerTableBody'></tbody>
      </table>
    </div>

    <div id='positionWrapper'>

      <div id='areaB1'>
        <select id='pos_CF' class='posSelect' onchange='updatePosition("CF", this.value)'></select>
        <select id='pos_LF' class='posSelect' onchange='updatePosition("LF", this.value)'></select>
        <select id='pos_RF' class='posSelect' onchange='updatePosition("RF", this.value)'></select>

        <select id='pos_SS' class='posSelect' onchange='updatePosition("SS", this.value)'></select>
        <select id='pos_2B' class='posSelect' onchange='updatePosition("2B", this.value)'></select>
        <select id='pos_3B' class='posSelect' onchange='updatePosition("3B", this.value)'></select>
        <select id='pos_1B' class='posSelect' onchange='updatePosition("1B", this.value)'></select>

        <select id='pos_P' class='posSelect' onchange='updatePosition("P", this.value)'></select>
        <select id='pos_C' class='posSelect' onchange='updatePosition("C", this.value)'></select>
        <select id='pos_DH' class='posSelect' onchange='updatePosition("DH", this.value)'></select>
      </div>

      <div id='middleWrapper'>

        <div id='areaC1'>
          <table class="table_common">
            <caption style='font-weight:bolder;'>선발 명단</caption>
            <thead>
              <tr>
                <th style="width: 25px;">타순</th>
                <th style="width: 90px;">선수명</th>
                <th style="width: 100px;">포지션</th>
              </tr>
            </thead>
            <tbody id='startingTableBody'></tbody>
          </table>
        </div>

        <div id='areaC2'>
          <table class="table_common">
            <caption style='font-weight:bolder;'>대기 명단</caption>
            <thead>
              <tr>
                <th style="width: 80px;">선수명</th>
              </tr>
            </thead>
            <tbody id='waitingTableBody'>
              <tr>
                <td></td>
              </tr>
              <tr>
                <td></td>
              </tr>
              <tr>
                <td></td>
              </tr>
              <tr>
                <td></td>
              </tr>
              <tr>
                <td></td>
              </tr>
              <tr>
                <td></td>
              </tr>
              <tr>
                <td></td>
              </tr>
              <tr>
                <td></td>
              </tr>
              <tr>
                <td></td>
              </tr>
              <tr>
                <td></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id='areaB2'>
      <div id='positionAbilityContainer'></div>
    </div>

  </div>

  <script>
    function showLoading(text = "처리 중...") {
      document.getElementById("loadingText").textContent = text;
      document.getElementById("loadingOverlay").style.display = "flex";
    }
    function hideLoading() {
      document.getElementById("loadingOverlay").style.display = "none";
    }

    const API = { getPlayers: 'https://getplayers-2guymqucma-uc.a.run.app' };

    let playerDB = [];
    let selectedPlayers = [];
    let positionAssignments = {
      CF: '', LF: '', RF: '', SS: '', '2B': '', '3B': '', P: '', C: '', DH: '', '1B': ''
    };
    let startingList = Array(10).fill().map(() => ({ name: '', pos: '' }));

    const abilityPositions = [
      { key: 'p', label: '투수' }, { key: 'c', label: '포수' },
      { key: '1b', label: '1루' }, { key: '2b', label: '2루' },
      { key: '3b', label: '3루' }, { key: 'ss', label: '유격' },
      { key: 'of', label: '외야' }
    ];

    /* 테마 관련 로직 */
    function applySavedTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
      }
    }

    function toggleDarkMode() {
      const isDark = document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    async function loadPlayerDB() {
      showLoading("선수 명단을 동기화하고 있습니다...");
      try {
        const res = await fetch(API.getPlayers);
        playerDB = await res.json();
      } finally {
        hideLoading();
      }
    }

    function nameWithNum(name) {
      if (!name) return '';
      const p = playerDB.find(x => x.name === name);
      return p ? `${name}(${p.num})` : name;
    }

    function renderPlayerSelect() {
      const select = document.getElementById('playerSelect');
      select.innerHTML = '';
      const candidates = playerDB.filter(p => !selectedPlayers.includes(p.name));
      if (candidates.length === 0) {
        const opt = document.createElement('option');
        opt.textContent = '추가 없음';
        opt.disabled = true;
        select.appendChild(opt);
        return;
      }
      candidates.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = `${p.name}(${p.num})`;
        select.appendChild(opt);
      });
    }

    function renderPlayerTable() {
      const tbody = document.getElementById('playerTableBody');
      tbody.innerHTML = '';
      selectedPlayers.slice().sort((a, b) => a.localeCompare(b, 'ko')).forEach(name => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${nameWithNum(name)}</td><td><button class='buttonStyles' onclick='removePlayer("${name}")'>삭제</button></td>`;
        tbody.appendChild(tr);
      });
    }

    function addPlayer() {
      const selectElement = document.getElementById('playerSelect');
      const name = selectElement.value;
      if (name && !selectedPlayers.includes(name)) {
        selectedPlayers.push(name);
        refreshAll();
        // 추가 후 select box 초기화
        if(selectElement.options.length > 0) {
          selectElement.selectedIndex = 0; 
        }
      }
    }

    function removePlayer(name) {
      selectedPlayers = selectedPlayers.filter(n => n !== name);
      for (const key in positionAssignments) { if (positionAssignments[key] === name) positionAssignments[key] = ''; }
      startingList = startingList.map(r => r.name === name ? { name: '', num: '', pos: '' } : r);
      refreshAll();
    }

    function renderPositionSelects() {
      const selects = document.querySelectorAll('.posSelect');
      selects.forEach(sel => {
        const pos = sel.id.replace('pos_', '');
        sel.innerHTML = '';
        const blank = document.createElement('option');
        blank.value = ''; blank.textContent = ' ';
        sel.appendChild(blank);
        selectedPlayers.forEach(name => {
          const p = playerDB.find(x => x.name === name);
          const opt = document.createElement('option');
          opt.value = name; opt.textContent = `${name}(${p.num})`;
          const assignedPos = Object.keys(positionAssignments).find(k => positionAssignments[k] === name);
          if (assignedPos && assignedPos !== pos) { opt.style.background = '#d0d0d0'; opt.style.color = '#555'; }
          if (positionAssignments[pos] === name) opt.selected = true;
          sel.appendChild(opt);
        });
      });
    }

    function updatePosition(pos, name) {
      // 1. 기존에 이 포지션을 맡고 있던 선수가 누군지 확인
      const oldPlayer = positionAssignments[pos];

      // 2. 만약 기존 선수가 있고, 이번에 새로운 선수(name)나 빈칸으로 바뀌어 포지션을 잃는다면?
      if (oldPlayer && oldPlayer !== name) {
        // 타순(startingList)에서 기존 선수를 찾아 빈칸으로 초기화 (-> 대기 명단으로 돌아감)
        const oldPlayerIndex = startingList.findIndex(r => r.name === oldPlayer);
        if (oldPlayerIndex !== -1) {
          startingList[oldPlayerIndex] = { name: '', num: '', pos: '' };
        }
      }

      // 3. 새로 들어갈 선수가 이미 다른 포지션을 맡고 있었다면 거기를 비워줌
      for (const key in positionAssignments) { 
        if (key !== pos && positionAssignments[key] === name) {
          positionAssignments[key] = '';
        } 
      }
      
      // 4. 새로운 포지션 할당
      positionAssignments[pos] = name;
      refreshAll();
    }
    
    function setupStartingTable() {
      const tbody = document.getElementById('startingTableBody');
      tbody.innerHTML = '';
      for (let i = 0; i < 10; i++) {
        const label = i === 9 ? '투수' : (i + 1);
        const tr = document.createElement('tr');
        if (i === 9) {
          tr.innerHTML = `<td>${label}</td><td><span id='start_name_${i}'></span></td><td id='start_pos_${i}'></td>`;
        } else {
          tr.innerHTML = `<td>${label}</td><td><select id='start_sel_${i}' style='width:90px' onchange='selectStarting(${i}, this.value)'></select></td><td id='start_pos_${i}'></td>`;
        }
        tbody.appendChild(tr);
      }
    }

    function renderStartingTable() {
      const assignedPlayers = Object.values(positionAssignments).filter(Boolean);
      for (let i = 0; i < 10; i++) {
        if (i === 9) {
          const pitcher = positionAssignments['P'];
          const span = document.getElementById('start_name_9');
          const tdPos = document.getElementById('start_pos_9');
          if (pitcher) {
            const p = playerDB.find(x => x.name === pitcher);
            startingList[9] = { name: pitcher, num: p.num, pos: convertPosition('P') };
            span.textContent = nameWithNum(pitcher); tdPos.textContent = convertPosition('P');
          } else {
            startingList[9] = { name: '', num: '', pos: '' };
            span.textContent = ''; tdPos.textContent = '';
          }
          continue;
        }
        const sel = document.getElementById(`start_sel_${i}`);
        sel.innerHTML = '';
        const blank = document.createElement('option');
        blank.value = ''; blank.textContent = ' '; blank.selected = true;
        sel.appendChild(blank);
        let selectedName = (startingList[i] && assignedPlayers.includes(startingList[i].name)) ? startingList[i].name : '';
        let hasSelected = false;
        assignedPlayers.forEach(name => {
          const p = playerDB.find(x => x.name === name);
          const opt = document.createElement('option');
          opt.value = name; opt.textContent = `${name}(${p.num})`;
          const alreadyUsed = startingList.slice(0, 9).some(r => r.name === name);
          if (alreadyUsed && selectedName !== name) { opt.style.background = '#d0d0d0'; opt.style.color = '#555'; }
          if (selectedName === name) { opt.selected = true; hasSelected = true; }
          sel.appendChild(opt);
        });
        if (!hasSelected) sel.selectedIndex = 0;
        const row = startingList[i];
        if (!row.name) { row.pos = ""; document.getElementById(`start_pos_${i}`).textContent = ""; continue; }
        const assignedPosKey = Object.entries(positionAssignments).find(([_, v]) => v === row.name)?.[0];
        row.pos = assignedPosKey ? convertPosition(assignedPosKey) : "";
        document.getElementById(`start_pos_${i}`).textContent = row.pos;
      }
    }

    function selectStarting(idx, name) {
      startingList.forEach((r, i) => { if (i !== idx && r.name === name) startingList[i] = { name: '', num: '', pos: '' }; });
      if (!name) { startingList[idx] = { name: '', num: '', pos: '' }; }
      else {
        const p = playerDB.find(x => x.name === name);
        const foundPos = Object.keys(positionAssignments).find(k => positionAssignments[k] === name);
        startingList[idx] = { name, num: p.num, pos: convertPosition(foundPos) };
      }
      refreshAll();
    }

    function renderWaitingTable() {
      const tbody = document.getElementById('waitingTableBody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      const used = startingList.map(r => r.name).filter(Boolean);
      const waitingList = selectedPlayers.filter(n => !used.includes(n)).sort((a, b) => a.localeCompare(b, 'ko'));
      const totalNeeded = Math.max(10, waitingList.length);
      while (rows.length < totalNeeded) {
        const tr = document.createElement("tr"); tr.innerHTML = "<td></td>"; tbody.appendChild(tr); rows.push(tr);
      }
      while (rows.length > totalNeeded) { tbody.removeChild(rows.pop()); }
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i]; row.classList.remove("position-selected");
        const cell = row.querySelector("td");
        const name = waitingList[i];
        if (name) {
          const assignedPos = Object.keys(positionAssignments).find(k => positionAssignments[k] === name);
          if (assignedPos) row.classList.add("position-selected");
          cell.textContent = nameWithNum(name);
        } else { cell.textContent = ""; }
      }
    }

    function renderPositionAbility() {
      const container = document.getElementById('positionAbilityContainer');
      container.innerHTML = '';
      const table = document.createElement('table');
      table.classList.add("table_common");
      const players = [...selectedPlayers].sort((a, b) => a.localeCompare(b, 'ko'));
      abilityPositions.forEach(pos => {
        const starters = []; const backups = [];
        players.forEach(name => {
          const p = playerDB.find(x => x.name === name);
          const val = Number(p[pos.key]);
          if (val === 2) starters.push(name); else if (val === 1) backups.push(name);
        });
        const trStarter = document.createElement('tr');
        const tdPos = document.createElement('td'); tdPos.textContent = pos.label; tdPos.rowSpan = 2;
        tdPos.style.background = 'var(--table-hdr-bg)'; tdPos.style.fontWeight = 'bolder';
        trStarter.appendChild(tdPos);
        const tdStarterLabel = document.createElement('td'); tdStarterLabel.textContent = '주';
        tdStarterLabel.style.background = 'var(--table-hdr-bg)'; tdStarterLabel.style.fontWeight = 'bolder';
        trStarter.appendChild(tdStarterLabel);
        starters.forEach(name => {
          const td = document.createElement('td'); td.textContent = nameWithNum(name);
          td.onclick = (e) => onAbilityClick(name, pos.key, e);
          const assigned = Object.keys(positionAssignments).find(k => positionAssignments[k] === name);
          if (assigned) {
            if (isSamePosition(pos.key, assigned)) td.classList.add("position-selected");
            else td.classList.add("position-locked");
          }
          trStarter.appendChild(td);
        });
        const trBackup = document.createElement('tr');
        const tdBackupLabel = document.createElement('td'); tdBackupLabel.textContent = '부';
        tdBackupLabel.style.background = 'var(--highlight-bg)'; tdBackupLabel.style.fontWeight = 'bolder';
        trBackup.appendChild(tdBackupLabel);
        backups.forEach(name => {
          const td = document.createElement('td'); td.textContent = nameWithNum(name);
          td.onclick = (e) => onAbilityClick(name, pos.key, e);
          const assigned = Object.keys(positionAssignments).find(k => positionAssignments[k] === name);
          if (assigned) {
            if (isSamePosition(pos.key, assigned)) td.classList.add("position-selected");
            else td.classList.add("position-locked");
          }
          trBackup.appendChild(td);
        });
        table.appendChild(trStarter); table.appendChild(trBackup);
      });
      container.appendChild(table);
    }

    function isSamePosition(posKey, assigned) {
      if (!assigned) return false;
      const a = assigned.toLowerCase();
      if (posKey === 'of') return ['cf', 'lf', 'rf'].includes(a);
      return posKey.toLowerCase() === a;
    }

    function convertPosition(code) {
      const map = { CF: '중견수(CF)', LF: '좌익수(LF)', RF: '우익수(RF)', SS: '유격수(SS)', '2B': '2루수(2B)', '3B': '3루수(3B)', '1B': '1루수(1B)', P: '투수(P)', C: '포수(C)', DH: '지명타자(DH)' };
      return map[code] || '';
    }

    let pendingOutfieldPlayer = null;
    function onAbilityClick(name, posKey, e) {
      // 1. 현재 이 선수가 어떤 포지션을 맡고 있는지 확인
      const currentPos = Object.keys(positionAssignments).find(k => positionAssignments[k] === name);

      // --- 외야수(OF) 처리 ---
      if (posKey === 'of') {
        // 이미 외야수(CF, LF, RF)로 지정된 상태에서 다시 누르면 -> 포지션에서 빼기 (팝업 안 띄움)
        if (currentPos && ['CF', 'LF', 'RF'].includes(currentPos)) {
          updatePosition(currentPos, ''); 
          return;
        }
        
        // 외야수가 아니라면 기존처럼 팝업 띄우기
        e.stopPropagation();
        pendingOutfieldPlayer = name;
        const popup = document.getElementById("outfieldPopup");
        popup.style.left = `50%`; popup.style.top = `50%`; popup.style.transform = `translate(-50%, -50%)`;
        popup.style.display = "block";
        return;
      }
      
      // --- 내야수 및 배터리 처리 ---
      const posMap = { p: 'P', c: 'C', '1b': '1B', '2b': '2B', '3b': '3B', ss: 'SS' };
      const targetPos = posMap[posKey];

      // 이미 해당 포지션에 배치된 상태에서 다시 누르면 -> 빈칸('')으로 업데이트해서 빼기
      if (positionAssignments[targetPos] === name) {
        updatePosition(targetPos, '');
      } else {
        // 그 외의 경우는 정상적으로 해당 포지션에 배치
        updatePosition(targetPos, name);
      }
    }

    function selectOutfieldPosition(posCode) {
      if (pendingOutfieldPlayer) {
        // updatePosition 내부에서 refreshAll을 호출하므로 여기서는 생략
        updatePosition(posCode, pendingOutfieldPlayer); 
      }
      pendingOutfieldPlayer = null; 
      closeOutfieldPopup(); 
    }

    function closeOutfieldPopup() { document.getElementById("outfieldPopup").style.display = "none"; }

    function refreshAll() {
      renderPlayerSelect(); renderPlayerTable(); renderPositionSelects();
      renderStartingTable(); renderWaitingTable(); renderPositionAbility();
    }

    async function saveOrder() {
      const name = document.getElementById('orderName').value.trim();

      // 1. 입력 유효성 검사
      if (!name) {
        return alert("오더명을 입력하세요.");
      }

      const pw = prompt("비밀번호를 입력하세요");
      if (!pw) return;

      // 로딩 시작
      showLoading("오더 저장 처리 중...");

      try {
        // 2. 관리자 비밀번호 검증
        const valid = await fetch("https://checkpassword-2guymqucma-uc.a.run.app", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: pw })
        }).then(r => r.json());

        if (valid.status !== "성공") {
          alert("비밀번호 오류");
          return;
        }

        // 3. 기존 오더 중복 확인
        const exists = await fetch("https://orderexists-2guymqucma-uc.a.run.app?name=" + encodeURIComponent(name)).then(r => r.json());
        if (exists.exists && !confirm("이미 존재하는 오더입니다. 덮어쓸까요?")) {
          return;
        }

        // 4. 저장할 데이터 패키징
        const payload = {
          players: selectedPlayers.map(n => {
            const p = playerDB.find(x => x.name === n);
            return { name: n, num: p.num };
          }),
          positions: { ...positionAssignments },
          startingList: startingList.map(r => ({ name: r.name, pos: r.pos }))
        };

        // 5. 서버에 오더 저장 요청
        const res = await fetch("https://saveorder-2guymqucma-uc.a.run.app", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ orderName: name, payload })
        }).then(r => r.json());

        // 6. 결과 처리
        if (res.status === "성공") {
          alert("저장되었습니다!");
          location.href = "index.html";
        } else {
          alert("저장 실패: " + res.error);
        }

      } catch (error) {
        console.error("저장 중 오류 발생:", error);
        alert("통신 오류가 발생했습니다. 다시 시도해주세요.");
      } finally {
        // 성공하든 실패하든 로딩 인디케이터를 반드시 숨김
        hideLoading();
      }
    }
    
    window.onload = async () => {
      applySavedTheme();
      await loadPlayerDB();
      setupStartingTable();
      refreshAll();

      const orderName = new URLSearchParams(window.location.search).get("orderName");
      if (orderName) {
        document.getElementById('orderName').value = orderName;
        try {
          const data = await fetch("https://getorder-2guymqucma-uc.a.run.app?name=" + encodeURIComponent(orderName)).then(r => r.json());
          if (data && data.payload) {
            selectedPlayers = data.payload.players ? data.payload.players.map(p => p.name) : [];
            positionAssignments = { ...positionAssignments, ...data.payload.positions };
            // startingList가 배열인지 확인하고 할당
            startingList = Array.isArray(data.payload.startingList) ? [...data.payload.startingList] : Array(10).fill().map(() => ({ name: '', pos: '' }));
            refreshAll();
          }
        } catch (e) {
          console.error("오더 정보를 불러오는 데 실패했습니다.", e);
        }
      }

      document.addEventListener("click", (e) => {
        const popup = document.getElementById("outfieldPopup");
        if (popup.style.display === "block" && !popup.contains(e.target)) closeOutfieldPopup();
      });
    };
  </script>

  <div id="outfieldPopup"
    style="display:none; position:fixed; background:var(--bg-main); border:2px solid var(--table-border); padding:20px; border-radius:10px; z-index:1000; text-align:center; color:var(--text-main);">
    <h3 style="margin-top:0;">외야 포지션 선택</h3>
    <div style="display:flex; gap:10px; justify-content:center;">
      <button class="buttonStyles" onclick="selectOutfieldPosition('LF')">좌익수(LF)</button>
      <button class="buttonStyles" onclick="selectOutfieldPosition('CF')">중견수(CF)</button>
      <button class="buttonStyles" onclick="selectOutfieldPosition('RF')">우익수(RF)</button>
    </div>
    <br>
    <button class="buttonStyles" onclick="closeOutfieldPopup()">취소</button>
  </div>

</body>

</html>
